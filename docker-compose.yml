version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: day-trade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traderpass}
      POSTGRES_DB: ${POSTGRES_DB:-day_trade}
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-day_trade}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Legacy system — retained for manual restart only. Not started by default.
  # To run it: `docker-compose --profile legacy up -d orchestrator`
  orchestrator:
    profiles: [legacy]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: day-trade-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-traderpass}@postgres:5432/${POSTGRES_DB:-day_trade}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ALPACA_DATA_URL: ${ALPACA_DATA_URL:-https://data.alpaca.markets}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      ENABLE_TOPOLOGY_GATE: ${ENABLE_TOPOLOGY_GATE:-false}
    ports:
      - '3001:3001'
      - '3000:3000'
    volumes:
      - ./logs:/app/logs

  # New odt trading loop (0DTE ORB + long call). Defaults to --dry-run.
  # To submit real (paper) orders: override command without --dry-run.
  odt-live:
    build:
      context: .
      dockerfile: odt/Dockerfile
    container_name: odt-live
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-traderpass}@postgres:5432/${POSTGRES_DB:-day_trade}
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ALPACA_DATA_URL: ${ALPACA_DATA_URL:-https://data.alpaca.markets}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NODE_ENV: ${NODE_ENV:-production}
      ODT_LOG_LEVEL: ${ODT_LOG_LEVEL:-info}
    # Symbols, strategies, and vehicles come from odt/src/config.ts (config.symbols).
    # To override at runtime: set ODT_SYMBOLS env (comma-list or JSON) or pass --symbols=SPY,QQQ.
    command: ['npx', 'tsx', 'odt/src/cli/live.ts']

  # New odt dashboard on :3001 (replaces what the legacy orchestrator used to publish).
  odt-dashboard:
    build:
      context: .
      dockerfile: odt/Dockerfile
    container_name: odt-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-traderpass}@postgres:5432/${POSTGRES_DB:-day_trade}
      # Alpaca keys must be present so dashboard-triggered backtests + tests
      # (which spawn as child processes inheriting env) can reach the data API.
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ALPACA_DATA_URL: ${ALPACA_DATA_URL:-https://data.alpaca.markets}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NODE_ENV: ${NODE_ENV:-production}
      ODT_DASHBOARD_PORT: 3001
      ODT_LOG_LEVEL: ${ODT_LOG_LEVEL:-info}
    ports:
      - '3001:3001'
    command: ['npx', 'tsx', 'odt/src/cli/dashboard.ts']

volumes:
  postgres_data:
